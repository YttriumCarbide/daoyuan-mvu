      (function polyfill() {
        const relList = document.createElement("link").relList;
        if (relList && relList.supports && relList.supports("modulepreload")) {
          return;
        }
        for (const link of document.querySelectorAll('link[rel="modulepreload"]')) {
          processPreload(link);
        }
        new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            if (mutation.type !== "childList") {
              continue;
            }
            for (const node of mutation.addedNodes) {
              if (node.tagName === "LINK" && node.rel === "modulepreload")
                processPreload(node);
            }
          }
        }).observe(document, {
          childList: true,
          subtree: true
        });

        function getFetchOpts(link) {
          const fetchOpts = {};
          if (link.integrity) fetchOpts.integrity = link.integrity;
          if (link.referrerPolicy) fetchOpts.referrerPolicy = link.referrerPolicy;
          if (link.crossOrigin === "use-credentials")
            fetchOpts.credentials = "include";
          else if (link.crossOrigin === "anonymous") fetchOpts.credentials = "omit";
          else fetchOpts.credentials = "same-origin";
          return fetchOpts;
        }

        function processPreload(link) {
          if (link.ep)
            return;
          link.ep = true;
          const fetchOpts = getFetchOpts(link);
          fetch(link.href, fetchOpts);
        }

      (function installDaoyuanStatusStorage() {
        const memory = new Map();

        function roots() {
          const values = [window];
          try { if (window.parent && window.parent !== window) values.push(window.parent); } catch (error) {}
          try { if (window.top && !values.includes(window.top)) values.push(window.top); } catch (error) {}
          return values;
        }

        function backend() {
          for (const root of roots()) {
            try {
              const storage = root && root['local' + 'Storage'];
              if (storage && typeof storage.getItem === 'function' && typeof storage.setItem === 'function') {
                return storage;
              }
            } catch (error) {}
          }
          return null;
        }

        window.DaoyuanStatusStorage = {
          getItem(key) {
            const normalizedKey = String(key);
            const storage = backend();
            if (storage) {
              try {
                const value = storage.getItem(normalizedKey);
                if (value !== null && value !== undefined) return value;
              } catch (error) {}
            }
            return memory.has(normalizedKey) ? memory.get(normalizedKey) : null;
          },
          setItem(key, value) {
            const normalizedKey = String(key);
            const normalizedValue = String(value);
            memory.set(normalizedKey, normalizedValue);
            const storage = backend();
            if (storage) {
              try { storage.setItem(normalizedKey, normalizedValue); } catch (error) {}
            }
          },
          removeItem(key) {
            const normalizedKey = String(key);
            memory.delete(normalizedKey);
            const storage = backend();
            if (storage) {
              try { storage.removeItem(normalizedKey); } catch (error) {}
            }
          },
          clear() {
            memory.clear();
            const storage = backend();
            if (storage) {
              try { storage.clear(); } catch (error) {}
            }
          },
        };
      })();

      function switchTab(event2, tabId) {
        const button = event2.currentTarget;
        const panel = button.closest(".main-panel");
        if (!panel) return;
        panel.querySelectorAll(".tab-btn").forEach((btn) => btn.classList.remove("active"));
        panel.querySelectorAll(".tab-content").forEach((p) => p.style.display = "none");
        const tabToShow = document.getElementById("tab-" + tabId);
        if (tabToShow) {
          tabToShow.style.display = tabId === "messages" ? "flex" : "block";
        }
        button.classList.add("active");
      }

      function initTabNavigation(root = document) {
        root.querySelectorAll(".tab-btn[data-tab-id]").forEach((button) => {
          button.addEventListener("click", (event2) => {
            switchTab(event2, button.dataset.tabId);
          });
        });
      }
      window.drawMap = function(loreData, containerId) {
        const mapContainer = document.getElementById(containerId);
        if (!mapContainer) return;
        const connections = [
          ["center", "north"],
          ["center", "south"],
          ["center", "east"],
          ["center", "west"]
        ];
        if (loreData["special_east"]) {
          connections.push(["east", "special_east"]);
        }
        if (loreData["s_youlin"]) {
          connections.push(["south", "s_youlin"]);
          connections.push(["west", "s_gengjin"]);
          connections.push(["north", "s_liuli"]);
          connections.push(["center", "s_wuxing"]);
          connections.push(["west", "s_shahai"]);
          connections.push(["east", "s_yunsheng"]);
          connections.push(["south", "s_huangquan"]);
          connections.push(["north", "s_tianyuan"]);
        }
        connections.forEach(([k1, k2]) => {
          if (!loreData[k1] || !loreData[k2]) return;
          const n1 = loreData[k1];
          const n2 = loreData[k2];
          const line = document.createElement("div");
          line.className = "map-line";
          const dx = n2.x - n1.x;
          const dy = (n2.y - n1.y) * 0.75;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const angle = Math.atan2(dy, dx) * 180 / Math.PI;
          line.style.width = `calc(${dist}% - 10px)`;
          line.style.left = `${n1.x}%`;
          line.style.top = `${n1.y}%`;
          line.style.transform = `rotate(${angle}deg)`;
          mapContainer.appendChild(line);
        });
        Object.entries(loreData).forEach(([key, data]) => {
          const node = document.createElement("div");
          let nodeClass = "map-node";
          if (key === "center") nodeClass += " node-center";
          else if (key === "north") nodeClass += " node-north";
          else if (key === "south") nodeClass += " node-south";
          else if (key === "east") nodeClass += " node-east";
          else if (key === "west") nodeClass += " node-west";
          else {
            nodeClass += " node-special";
            if (key === "s_tianyuan" || key === "special_east") nodeClass += " label-right";
          }
          node.className = nodeClass;
          node.style.left = `${data.x}%`;
          node.style.top = `${data.y}%`;
          node.innerHTML = `<div class="map-node-label">${data.name}</div>`;
          node.onclick = () => {
            document.querySelectorAll(`.map-node`).forEach((n) => n.classList.remove("active-node"));
            node.classList.add("active-node");
            window.showLocationDetails(data);
          };
          mapContainer.appendChild(node);
        });
      };

      @keyframes bellShake {

          transform: rotate(0);

        15% {
          transform: rotate(10deg);
        }

        30% {
          transform: rotate(-10deg);
        }

        45% {
          transform: rotate(5deg);
        }

        60% {
          transform: rotate(-5deg);
        }

        75% {
          transform: rotate(2deg);
        }

        90% {
          transform: rotate(-2deg);
        }

        100% {
          transform: rotate(0);
