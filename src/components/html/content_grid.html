          <div id="tab-map" class="tab-content" style="display: none">
            
            <div class="map-section-title" style="margin-top: 5px">
              ✦ 玄 天 界 ✦
            </div>

            <div style="display:flex; justify-content:center; gap:30px; margin-top:15px; margin-bottom:15px; font-size:0.85em; font-weight:bold; letter-spacing:1px;">
              <div id="btn-map-2d" style="cursor:pointer; color:var(--text-dim); transition:color 0.3s;"
                onclick="
                  const p = document.getElementById('xuantian-map-img');
                  const f = document.getElementById('map-3d-iframe');
                  const b3d = document.getElementById('btn-map-3d');
                  if(p.style.display === 'none') {
                    p.style.display = 'block';
                    this.innerHTML = '[ 关闭 2D 全图 ]';
                    f.src = '';
                    f.style.display = 'none';
                    b3d.innerHTML = '[ 开启 3D 舆图 ]';
                  } else {
                    p.style.display = 'none';
                    this.innerHTML = '[ 查看 2D 全图 ]';
                  }
                "
                onmouseover="this.style.color = 'var(--accent-gold)'"
                onmouseout="this.style.color = 'var(--text-dim)'"
              >
                [ 查看 2D 全图 ]
              </div>

              <div id="btn-map-3d" style="cursor:pointer; color:var(--accent-mana); transition:color 0.3s;"
                onclick="
                  const f = document.getElementById('map-3d-iframe');
                  const p = document.getElementById('xuantian-map-img');
                  const b2d = document.getElementById('btn-map-2d');
                  
                  if(f.style.display === 'none') {
                    const open3D = () => {
                      f.src = 'https://mumetrace.github.io/daoyuan-map/';
                      f.style.display = 'block';
                      this.innerHTML = '[ 关闭 3D 舆图 ]';
                      p.style.display = 'none';
                      b2d.innerHTML = '[ 查看 2D 全图 ]';
                    };

                    const warned = localStorage.getItem('dy_map3d_warned');
                    if (!warned) {
                       const wm = document.createElement('div');
                       wm.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999999;display:flex;justify-content:center;align-items:center;backdrop-filter:blur(5px);';
                       wm.innerHTML = `
                         <div style='background:linear-gradient(145deg,rgba(30,20,30,0.95),rgba(20,10,20,0.98));border:1px solid var(--accent-mana);border-radius:12px;width:80%;max-width:320px;padding:25px;box-shadow:0 0 40px rgba(100,180,255,0.3);text-align:center;'>
                           <div style='color:var(--accent-mana);font-size:1.2em;font-weight:bold;margin-bottom:15px;'>⚠️ 性能提示</div>
                           <div style='color:var(--text-main);font-size:0.9em;line-height:1.6;margin-bottom:20px;'>
                             3D 立体舆图在部分手机设备上可能会引起明显的<span style='color:var(--accent-blood);font-weight:bold;'>卡顿或发热</span>。<br><br>建议在电脑端或性能较好的设备上体验。
                           </div>
                           <label style='display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text-dim);font-size:0.85em;cursor:pointer;margin-bottom:20px;'>
                             <input type='checkbox' id='map3d-warn-cb' style='accent-color:var(--accent-mana);width:16px;height:16px;cursor:pointer;'>
                             <span>不再提示</span>
                           </label>
                           <div style='display:flex;gap:15px;justify-content:center;'>
                             <button id='map3d-warn-no' style='flex:1;background:rgba(255,255,255,0.1);color:var(--text-dim);border:1px solid rgba(255,255,255,0.2);padding:10px;border-radius:6px;cursor:pointer;'>取消</button>
                             <button id='map3d-warn-yes' style='flex:1;background:linear-gradient(135deg,rgba(100,180,255,0.8),rgba(50,130,255,0.8));color:#fff;border:none;padding:10px;border-radius:6px;cursor:pointer;'>继续开启</button>
                           </div>
                         </div>
                       `;
                       document.body.appendChild(wm);
                       document.getElementById('map3d-warn-no').onclick = () => wm.remove();
                       document.getElementById('map3d-warn-yes').onclick = () => {
                         if(document.getElementById('map3d-warn-cb').checked) {
                           localStorage.setItem('dy_map3d_warned', '1');
                         }
                         wm.remove();
                         open3D();
                       };
                    } else {
                       open3D();
                    }
                  } else {
                    f.src = '';
                    f.style.display = 'none';
                    this.innerHTML = '[ 开启 3D 舆图 ]';
                  }
                "
                onmouseover="this.style.color = 'var(--accent-gold)'"
                onmouseout="this.style.color = 'var(--accent-mana)'"
              >
                [ 开启 3D 舆图 ]
              </div>
            </div>
