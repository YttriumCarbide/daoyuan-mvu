<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Iframe Reactive Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e1e;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .controls {
      padding: 15px;
      background: #2d2d2d;
      border-bottom: 1px solid #444;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 8px 16px;
      background: #4a4a4a;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #5a5a5a;
    }
    .workspace {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }
    .iframe-wrapper {
      background: #000;
      border: 2px solid #555;
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
      /* Using resize to allow manual testing of dimensions */
      resize: both;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="controls">
    <span>尺寸预设:</span>
    <button onclick="setSize('100%', '100%')">全屏充满</button>
    <button onclick="setSize(800, 600)">800 x 600</button>
    <button onclick="setSize(375, 812)">手机 (375 x 812)</button>
    <button onclick="setSize(1024, 768)">平板 (1024 x 768)</button>
    <span style="margin-left: auto; font-size: 0.9em; color: #aaa;">支持右下角拖拽缩放</span>
  </div>
  <div class="workspace">
    <div class="iframe-wrapper" id="wrapper" style="width: 100%; height: 100%;">
      <iframe id="test-iframe"></iframe>
    </div>
  </div>

  <script>
    async function initIframe() {
      try {
        // Fetch the transformed index.html from Vite dev server
        const response = await fetch('/index.html');
        let html = await response.text();
        
        // Add a base tag so relative assets resolve correctly inside srcdoc
        if (!html.includes('<base ')) {
          html = html.replace('<head>', `<head>\n  <base href="${window.location.origin}/">`);
        }
        
        document.getElementById('test-iframe').srcdoc = html;
      } catch (err) {
        console.error('Failed to load iframe content:', err);
      }
    }

    function setSize(width, height) {
      const wrapper = document.getElementById('wrapper');
      wrapper.style.width = typeof width === 'number' ? `${width}px` : width;
      wrapper.style.height = typeof height === 'number' ? `${height}px` : height;
    }

    initIframe();
  </script>
</body>
</html>
